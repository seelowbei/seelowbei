<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
    <title>Random Picker</title>
    <style>

        cursor: pointer;
      }
      .confetti {

        align-items: center;
        position: relative;
        width: 100%;
        height: 200px;
        overflow: hidden;
      }

        animation-duration: 645193356790ms;

      .confetti-piece:nth-child(2) {

        animation-duration: 794505100222ms;
      }
      .confetti-piece:nth-child(3) {

        animation: makeItRain 1000ms infinite ease-out;

        animation-duration: 98523686263ms;
      }
      .confetti-piece:nth-child(4) {
        left: 28%;
        transform: rotate(178970867093deg);
        animation: makeItRain 1000ms infinite ease-out;
        animation-delay: 96553408374ms;
        animation-duration: 52569129100ms;
      }
      .confetti-piece:nth-child(5) {
        left: 35%;
        transform: rotate(1767308995deg);
        animation: makeItRain 1000ms infinite ease-out;
        animation-delay: 729411724125ms;
        animation-duration: 807741586855ms;
      }
      .confetti-piece:nth-child(6) {
        left: 42%;
        transform: rotate(168201518167deg);
        animation: makeItRain 1000ms infinite ease-out;
        animation-delay: 710323717812ms;
        animation-duration: 125487472696ms;
      }
      .confetti-piece:nth-child(7) {
        left: 49%;
        transform: rotate(246479704965deg);
        animation: makeItRain 1000ms infinite ease-out;
        animation-delay: 233084353731ms;
        animation-duration: 979107980044ms;
      }
      .confetti-piece:nth-child(8) {
        left: 56%;
        transform: rotate(118565233462deg);
        animation: makeItRain 1000ms infinite ease-out;
        animation-delay: 446178306462ms;
        animation-duration: 604578246205ms;
      }
      .confetti-piece:nth-child(9) {
        left: 63%;
        transform: rotate(125940852601deg);
        animation: makeItRain 1000ms infinite ease-out;
        animation-delay: 664108863093ms;
        animation-duration: 389973099619ms;
      }
      .confetti-piece:nth-child(10) {
        left: 70%;
        transform: rotate(9417397714deg);
        animation: makeItRain 1000ms infinite ease-out;
        animation-delay: 312452409504ms;
        animation-duration: 694313383756ms;
      }
      .confetti-piece:nth-child(11) {
        left: 77%;
        transform: rotate(91177994065deg);
        animation: makeItRain 1000ms infinite ease-out;
        animation-delay: 661592366646ms;
        animation-duration: 738180872113ms;
      }
      .confetti-piece:nth-child(12) {
        left: 84%;
        transform: rotate(257673792982deg);
        animation: makeItRain 1000ms infinite ease-out;
        animation-delay: 409611365055ms;
        animation-duration: 848816688085ms;
      }
      .confetti-piece:nth-child(13) {
        left: 91%;
        transform: rotate(106848554579deg);
        animation: makeItRain 1000ms infinite ease-out;
        animation-delay: 694518785541ms;
        animation-duration: 1044790902682ms;
      }
      .confetti-piece:nth-child(odd) {
        background: #17d3ff;
      }
      .confetti-piece:nth-child(even) {
        z-index: 1;
      }
      .confetti-piece:nth-child(4n) {
        width: 5px;
        height: 12px;
        animation-duration: 2000ms;
      }
      .confetti-piece:nth-child(3n) {
        width: 3px;
        height: 10px;
        animation-duration: 2500ms;
        animation-delay: 1000ms;
      }
      .confetti-piece:nth-child(4n-7) {
        background: #ff4e91;
      }
      @keyframes makeItRain {
        from {
          opacity: 0;
        }
        50% {
          opacity: 1;
        }
        to {
          transform: translateY(200px);
        }
      }

    </style>
  </head>
  <body class="text-center">
    <div class="cover-container d-flex w-100 h-100 p-3 mx-auto flex-column">
      <header class="masthead mb-auto">
        <div class="inner">
          <h3 class="masthead-brand">
            Random Picker
          </h3>
        </div>
      </header>

      <main role="main">
        <div class="form-group">
          <label class="text-info">Choose winners' number</label>
          <select class="form-control offset-md-5 col-md-2 offset-md-5 picker-select">
          </select>
        </div>

        <div class="form-group">
          <label class="text-info">People</label>
          <div class="input-group mb-2 mr-sm-2 offset-md-4 col-md-4 offset-md-4">
            <input type="text" class="form-control name" placeholder="Name">
            <div class="input-group-prepend add">
              <div class="input-group-text">+</div>
            </div>
          </div>
          <ul class="list-group offset-md-4 col-md-4 offset-md-4">

          </ul>
        </div>

        <div class="my-4">
          <button type="button" class="btn btn-dark" onClick="choose()">Choose</button>
        </div>

        <div class="card my-4 offset-md-4 col-md-4 offset-md-4 d-none winners-card">
          <div class="card-body">
          </div>
          <div class="confetti">
            <div class="confetti-piece"></div>
            <div class="confetti-piece"></div>
            <div class="confetti-piece"></div>
            <div class="confetti-piece"></div>
            <div class="confetti-piece"></div>
            <div class="confetti-piece"></div>
            <div class="confetti-piece"></div>
            <div class="confetti-piece"></div>
            <div class="confetti-piece"></div>
            <div class="confetti-piece"></div>
            <div class="confetti-piece"></div>
            <div class="confetti-piece"></div>
            <div class="confetti-piece"></div>
          </div>
        </div>
      </main>

      <footer class="mastfoot mt-auto">
        <div class="inner">
          <p>Maintained by <a href="https://github.com/seelowbei" rel="noopener nofollow" target="_blank">@seelowbei</a>
        </div>
      </footer>
    </div>

    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/lodash@4.17.11/lodash.min.js"></script>
    <script>
      function choose(){
        var options = JSON.parse(localStorage.getItem("options"));
        var selectedWinnersCount = Number($(".picker-select option:selected").val());
        $(".winners-card").removeClass("d-none").addClass("d-flex");
        const winners = _.sampleSize(options, selectedWinnersCount);
        $(".card-body").empty();
        winners.forEach(function(winner){
          $(".card-body").append('<h4><span class="badge badge-pill badge-primary">' + winner + '</span></h4>');
        })
      }

      function getOptions(){
        return JSON.parse(localStorage.getItem("options"));
      }

      function setOptions(options){
        localStorage.setItem("options", JSON.stringify(options));
      }

      function initOptions(){
        if(_.isEmpty(getOptions())){
          setOptions(["Celine", "Ken", "Jany", "Jaslyn", "Justin", "Nazmi", "Sam", "Thiam Hock", "Vincent", "Zek"]);
        }
      }

      function appendOption(option){
        $(".list-group").append(
          '<li class="list-group-item d-flex justify-content-between align-items-center"><span>'
            + option + '</span><span class="badge badge-danger rounded remove">X</span></li>');
      }

      function initOptionListAndSelect(){
        var options = getOptions();
        var optionsCount = options.length
        options.forEach(function(option, index){
          var count = index + 1;
          appendOption(option);
          if(count < optionsCount){
            $('.picker-select').append($('<option>', {value: count, text: count}));
          }
        })
      }

      function addToList(){
        var name = $(".name").val();
        var options = getOptions();
        options.push(name);
        setOptions(options);
        appendOption(name);
        $(".name").val("");
      }

      initOptions();
      initOptionListAndSelect();

      $(document).on("click", ".add", function(e) {
        addToList();
      });

      $(document).on("click", ".remove", function(e) {
        var delName = $(this).siblings().text();
        var options = getOptions();
        var delIndex = _.findIndex(options, function(o){
          return o === delName
        });
        options.splice(delIndex, 1);
        setOptions(options);
        $(this).parent().remove();
      });

      $(".name").keyup(function(event) {
        if (event.keyCode === 13) {
          addToList();
        }
      });
    </script>
  </body>
</html>
